<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Text Summarizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 700px;
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #summary {
      margin-top: 20px;
      background: #f3f3f3;
      padding: 15px;
      border-radius: 5px;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <h1>AI Text Summarizer</h1>

  <textarea id="inputText" placeholder="Paste your text here..."></textarea>
  <br>
  <button onclick="getSummary()">Summarize</button>

  <h2>Summary:</h2>
  <div id="summary">Your summary will appear here.</div>

  <script>
    async function getSummary() {
      const text = document.getElementById('inputText').value.trim();
      const summaryDiv = document.getElementById('summary');

      if (!text) {
        summaryDiv.textContent = "Please enter text to summarize.";
        return;
      }

      summaryDiv.textContent = "Generating summary...";

      try {
        const response = await fetch('http://localhost:5001/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        if (data.error) {
          summaryDiv.textContent = "Error: " + data.error;
        } else {
          summaryDiv.textContent = data.summary;
        }

      } catch (err) {
        summaryDiv.textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
